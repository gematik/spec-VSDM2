name: Generate Images from PlantUML and drawio

on:
  push:
    paths:
      - 'src/plantuml/**'
      - 'src/drawio/**'
    branches: 
      - main
      - github_action_test
  workflow_dispatch:

env:
  OUTPUT_DIR: images
  PLANTUML_PREFIX: uml
  DRAWIO_PREFIX: diagram

jobs:
  generate_images:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create output directory
        run: |
          mkdir -p ${{ env.OUTPUT_DIR }}
          echo "📁 Output directory: ${{ env.OUTPUT_DIR }}"

      # PlantUML mit Java Setup (zuverlässiger als externe Action)
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download and setup PlantUML
        run: |
          wget https://github.com/plantuml/plantuml/releases/latest/download/plantuml.jar -O /tmp/plantuml.jar
          echo "PlantUML downloaded successfully"

      - name: Generate PlantUML images
        continue-on-error: true
        run: |
          echo "=== Generating PlantUML images ==="
          puml_files=$(find src/plantuml -name "*.puml" -o -name "*.plantuml" 2>/dev/null)
          if [ -z "$puml_files" ]; then
            echo "No PlantUML files found in src/plantuml/"
          else
            echo "Found PlantUML files:"
            echo "$puml_files"
            
            for file in $puml_files; do
              echo "Processing: $file"
              base=$(basename "$file" | sed 's/\.[^.]*$//')
              
              # Generate PNG
              if java -jar /tmp/plantuml.jar -tpng "$file" -o "${{ env.OUTPUT_DIR }}"; then
                if [ -f "${{ env.OUTPUT_DIR }}/${base}.png" ]; then
                  mv "${{ env.OUTPUT_DIR }}/${base}.png" "${{ env.OUTPUT_DIR }}/${{ env.PLANTUML_PREFIX }}-${base}.png"
                  echo "✅ Generated PNG: ${{ env.OUTPUT_DIR }}/${{ env.PLANTUML_PREFIX }}-${base}.png"
                fi
              else
                echo "❌ Failed to generate PNG for $file"
              fi
              
              # Generate SVG
              if java -jar /tmp/plantuml.jar -tsvg "$file" -o "${{ env.OUTPUT_DIR }}"; then
                if [ -f "${{ env.OUTPUT_DIR }}/${base}.svg" ]; then
                  mv "${{ env.OUTPUT_DIR }}/${base}.svg" "${{ env.OUTPUT_DIR }}/${{ env.PLANTUML_PREFIX }}-${base}.svg"
                  echo "✅ Generated SVG: ${{ env.OUTPUT_DIR }}/${{ env.PLANTUML_PREFIX }}-${base}.svg"
                fi
              else
                echo "❌ Failed to generate SVG for $file"
              fi
            done
          fi

      # Draw.io mit bewährter Docker-Lösung
      - name: Generate Draw.io images
        continue-on-error: true
        run: |
          echo "=== Generating drawio images ==="
          drawio_files=$(find src/drawio -name "*.drawio" -o -name "*.dio" 2>/dev/null)
          if [ -z "$drawio_files" ]; then
            echo "No drawio files found in src/drawio/"
          else
            echo "Found drawio files:"
            echo "$drawio_files"
            
            for file in $drawio_files; do
              echo "Processing: $file"
              base=$(basename "$file" | sed 's/\.[^.]*$//')
              
              # Generate PNG using rlespinasse/drawio-export (bewährte Action)
              docker run --rm \
                -v $(pwd):/data \
                rlespinasse/drawio-export:4.4.0 \
                --format png \
                --output "${{ env.OUTPUT_DIR }}" \
                "$file"
              
              # Rename with prefix
              if [ -f "${{ env.OUTPUT_DIR }}/${base}.png" ]; then
                mv "${{ env.OUTPUT_DIR }}/${base}.png" "${{ env.OUTPUT_DIR }}/${{ env.DRAWIO_PREFIX }}-${base}.png"
                echo "✅ Generated PNG: ${{ env.OUTPUT_DIR }}/${{ env.DRAWIO_PREFIX }}-${base}.png"
              fi
              
              # Generate SVG
              docker run --rm \
                -v $(pwd):/data \
                rlespinasse/drawio-export:4.4.0 \
                --format svg \
                --output "${{ env.OUTPUT_DIR }}" \
                "$file"
              
              # Rename with prefix
              if [ -f "${{ env.OUTPUT_DIR }}/${base}.svg" ]; then
                mv "${{ env.OUTPUT_DIR }}/${base}.svg" "${{ env.OUTPUT_DIR }}/${{ env.DRAWIO_PREFIX }}-${base}.svg"
                echo "✅ Generated SVG: ${{ env.OUTPUT_DIR }}/${{ env.DRAWIO_PREFIX }}-${base}.svg"
              fi
            done
          fi

      - name: Show Git Status for Images
        run: |
          echo "=== Git Status ==="
          git status
          echo "=== Generated image files in ${{ env.OUTPUT_DIR }}/ ==="
          find ${{ env.OUTPUT_DIR }} -name "*.png" -o -name "*.svg" 2>/dev/null | head -20
          echo "=== Total images generated ==="
          find ${{ env.OUTPUT_DIR }} -name "*.png" -o -name "*.svg" 2>/dev/null | wc -l

      - name: Commit and push generated images
        run: |
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          image_count=$(find ${{ env.OUTPUT_DIR }} -name "*.png" -o -name "*.svg" 2>/dev/null | wc -l)
          echo "Found $image_count generated images"
          
          if [ "$image_count" -eq 0 ]; then
            echo "No images to commit"
            exit 0
          fi
          
          git add ${{ env.OUTPUT_DIR }}/
          if git diff --staged --quiet; then
            echo "No changes staged for commit"
          else
            git commit -m "🖼️ Auto-generate $image_count images - PlantUML: ${{ env.PLANTUML_PREFIX }}-*.{png,svg} - Draw.io: ${{ env.DRAWIO_PREFIX }}-*.{png,svg} - Generated: $(date)"
            git push
            echo "✅ $image_count images committed and pushed"
          fi
